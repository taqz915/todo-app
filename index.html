<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>할일 목록</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="header-title">
                <span class="material-icons">task_alt</span>
                할일 목록
            </h1>
        </header>

        <div class="user-info-card card">
            <div class="card-content">
                <div id="authSection" class="auth-section">
                    <button id="showAuthModalBtn" class="btn-secondary">
                        <span class="material-icons" style="font-size: 18px;">login</span>
                        <span>로그인</span>
                    </button>
                </div>
                <div id="userSection" class="user-section" style="display: none;">
                    <div class="user-greeting" id="userGreeting"></div>
                    <button id="logoutBtn" class="btn-secondary logout-btn">
                        <span class="material-icons" style="font-size: 18px;">logout</span>
                        <span>로그아웃</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="add-todo-card card">
            <div class="card-content">
                <div class="input-group">
                    <span class="material-icons input-icon">add_circle</span>
                    <input type="text" id="todoInput" class="input-field" placeholder="새로운 할일을 입력하세요">
                </div>
                <div class="priority-selector">
                    <button class="priority-btn" data-priority="high">
                        <span class="material-icons">priority_high</span>
                        높음
                    </button>
                    <button class="priority-btn active" data-priority="medium">
                        <span class="material-icons">remove</span>
                        중간
                    </button>
                    <button class="priority-btn" data-priority="low">
                        <span class="material-icons">arrow_downward</span>
                        낮음
                    </button>
                </div>
                <button id="addTodoBtn" class="btn-primary">
                    <span class="material-icons">add</span>
                    추가하기
                </button>
            </div>
        </div>

        <div class="todo-lists">
            <div class="priority-section" data-priority="high">
                <div class="priority-header high">
                    <span class="material-icons">priority_high</span>
                    <h2>높은 우선순위</h2>
                    <span class="count-badge" id="highCount">0</span>
                </div>
                <div class="todo-list" id="highPriorityList"></div>
            </div>

            <div class="priority-section" data-priority="medium">
                <div class="priority-header medium">
                    <span class="material-icons">remove</span>
                    <h2>중간 우선순위</h2>
                    <span class="count-badge" id="mediumCount">0</span>
                </div>
                <div class="todo-list" id="mediumPriorityList"></div>
            </div>

            <div class="priority-section" data-priority="low">
                <div class="priority-header low">
                    <span class="material-icons">arrow_downward</span>
                    <h2>낮은 우선순위</h2>
                    <span class="count-badge" id="lowCount">0</span>
                </div>
                <div class="todo-list" id="lowPriorityList"></div>
            </div>
        </div>

        <footer class="footer">
            <div class="stats">
                <div class="stat-item">
                    <span class="material-icons">check_circle</span>
                    <span>완료: <strong id="completedCount">0</strong></span>
                </div>
                <div class="stat-item">
                    <span class="material-icons">radio_button_unchecked</span>
                    <span>미완료: <strong id="pendingCount">0</strong></span>
                </div>
            </div>
        </footer>
    </div>

    <!-- Auth Modal -->
    <div id="authModal" class="modal" style="display: none;">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">이메일로 로그인</h2>
                <button id="closeModalBtn" class="modal-close">
                    <span class="material-icons">close</span>
                </button>
            </div>
            <div class="modal-body">
                <div id="authForm" class="auth-form">
                    <p class="auth-description">
                        이메일 주소를 입력하시면 로그인 링크를 보내드립니다.
                    </p>
                    <div class="input-group">
                        <span class="material-icons input-icon">email</span>
                        <input
                            type="email"
                            id="emailInput"
                            class="input-field"
                            placeholder="your-email@example.com"
                            autocomplete="email"
                        >
                    </div>
                    <button id="sendMagicLinkBtn" class="btn-primary">
                        <span class="material-icons">send</span>
                        <span>매직 링크 전송</span>
                    </button>

                    <div class="divider">
                        <span>또는</span>
                    </div>

                    <div class="social-login">
                        <button id="googleLoginBtn" class="btn-social btn-google">
                            <svg width="18" height="18" viewBox="0 0 18 18">
                                <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
                                <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
                                <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707 0-.593.102-1.17.282-1.709V4.958H.957C.347 6.173 0 7.548 0 9c0 1.452.348 2.827.957 4.042l3.007-2.335z"/>
                                <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
                            </svg>
                            <span>Google로 계속하기</span>
                        </button>
                        <button id="githubLoginBtn" class="btn-social btn-github">
                            <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
                                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                            </svg>
                            <span>GitHub으로 계속하기</span>
                        </button>
                    </div>
                </div>
                <div id="authSuccess" class="auth-success" style="display: none;">
                    <div class="success-icon">
                        <span class="material-icons">mark_email_read</span>
                    </div>
                    <h3>이메일을 확인해주세요!</h3>
                    <p id="successMessage">
                        로그인 링크를 전송했습니다. 이메일을 확인하고 링크를 클릭해주세요.
                    </p>
                </div>
                <div id="authError" class="auth-error" style="display: none;">
                    <span class="material-icons">error</span>
                    <p id="errorMessage"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
